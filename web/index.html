<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FancyBot | Advanced Terminal Dashboard</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide-react"></script>
    <style>
        :root {
            --bg-deep: #000b1e;
            --bg-panel: #00122e;
            --cyan: #00ffff;
            --magenta: #ff00ff;
            --green: #00ff00;
            --red: #ff0000;
            --yellow: #ffff00;
            --white: #ffffff;
            --dim: rgba(255, 255, 255, 0.4);
            --border: rgba(0, 255, 255, 0.2);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: var(--bg-deep);
            color: var(--white);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            height: 100vh;
        }

        #root { height: 100%; display: flex; flex-direction: column; }

        /* Header */
        header {
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.5);
            border-bottom: 2px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-title { color: var(--cyan); font-weight: bold; font-size: 1.2rem; }
        .header-status { color: var(--green); display: flex; align-items: center; gap: 8px; }
        .pulse { width: 10px; height: 10px; background: var(--green); border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* Dashboard Layout */
        main {
            display: grid;
            grid-template-columns: 350px 1fr;
            grid-template-rows: 1fr 200px;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 50px);
        }

        .panel {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 8px 12px;
            background: rgba(0, 255, 255, 0.1);
            color: var(--cyan);
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
        }
        .panel-content { padding: 15px; overflow-y: auto; flex: 1; }

        /* Account Stats */
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .stat-label { color: var(--dim); font-size: 0.8rem; text-transform: uppercase; }
        .stat-value { font-size: 1.1rem; font-weight: bold; }
        .progress-container { height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .progress-bar { height: 100%; transition: width 0.3s ease; }

        /* Position Table */
        .pos-card {
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 10px;
            padding: 10px;
            background: rgba(255,255,255,0.02);
        }
        .pos-header { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .pos-symbol { font-weight: bold; font-size: 1.1rem; }
        .side-long { color: var(--green); }
        .side-short { color: var(--red); }
        .pos-details { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; font-size: 0.85rem; }

        /* Logs */
        .log-line { font-size: 0.8rem; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .log-info { color: var(--cyan); }
        .log-warn { color: var(--yellow); }
        .log-error { color: var(--red); }
        .log-success { color: var(--green); }

        /* Utility */
        .text-green { color: var(--green); }
        .text-red { color: var(--red); }
        .text-cyan { color: var(--cyan); }
        .text-yellow { color: var(--yellow); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Activity, BarChart3, Terminal, TrendingUp, Wallet, ShieldAlert } = lucide;

        const Dashboard = () => {
            const [summary, setSummary] = useState(null);
            const [positions, setPositions] = useState([]);
            const [logs, setLogs] = useState([]);
            const [connected, setConnected] = useState(false);

            const API_BASE = "http://localhost:8000/api";

            const fetchData = async () => {
                try {
                    const [sumRes, posRes, logRes] = await Promise.all([
                        fetch(`${API_BASE}/summary`),
                        fetch(`${API_BASE}/positions`),
                        fetch(`${API_BASE}/logs`)
                    ]);
                    
                    if (sumRes.ok) setSummary(await sumRes.json());
                    if (posRes.ok) setPositions(await posRes.json());
                    if (logRes.ok) setLogs(await logRes.json());
                    setConnected(true);
                } catch (e) {
                    console.error("API connection failed", e);
                    setConnected(false);
                }
            };

            useEffect(() => {
                const interval = setInterval(fetchData, 1000);
                return () => clearInterval(interval);
            }, []);

            return (
                <React.Fragment>
                    <header>
                        <div className="header-title">FANCYBOT // CORE_INTERFACE v4.1</div>
                        <div className="header-status">
                            {connected ? (
                                <React.Fragment>
                                    <span className="pulse"></span>
                                    <span>SYSTEM_ONLINE</span>
                                </React.Fragment>
                            ) : (
                                <span className="text-red">SYSTEM_OFFLINE</span>
                            )}
                        </div>
                    </header>

                    <main>
                        {/* Account Summary */}
                        <section className="panel">
                            <div className="panel-header">
                                <span><Wallet size={14} style={{verticalAlign: 'middle', marginRight: '6px'}}/> ACCOUNT_SUMMARY</span>
                            </div>
                            <div className="panel-content">
                                <div className="stat-block">
                                    <div className="stat-row">
                                        <span className="stat-label">Balance</span>
                                        <span className="stat-value">${summary?.balance || "0.00"}</span>
                                    </div>
                                    <div className="stat-row">
                                        <span className="stat-label">uPnL</span>
                                        <span className={`stat-value ${summary?.upnl >= 0 ? "text-green" : "text-red"}`}>
                                            ${summary?.upnl || "0.0000"}
                                        </span>
                                    </div>
                                    <div className="stat-row">
                                        <span className="stat-label">Entropy</span>
                                        <span className="stat-value text-yellow">{summary?.entropy || "0.00"}</span>
                                    </div>
                                    <div className="stat-row">
                                        <span className="stat-label">Equity</span>
                                        <span className="stat-value text-cyan">${summary?.equity || "0.00"}</span>
                                    </div>
                                </div>

                                <div style={{marginTop: '30px'}}>
                                    <div className="panel-header" style={{background: 'none', padding: '0', marginBottom: '10px'}}>
                                        <span><Activity size={14} /> SESSION_PERFORMANCE</span>
                                    </div>
                                    <div className="stat-row">
                                        <span className="stat-label">Win Rate</span>
                                        <span className="text-green">{summary?.stats.win_rate}%</span>
                                    </div>
                                    <div className="progress-container">
                                        <div className="progress-bar" style={{width: `${summary?.stats.win_rate}%`, backgroundColor: 'var(--green)'}}></div>
                                    </div>
                                    <div className="stat-row" style={{marginTop: '15px'}}>
                                        <span className="stat-label">Profit Factor</span>
                                        <span className="text-yellow">{summary?.stats.profit_factor}</span>
                                    </div>
                                    <div className="stat-row">
                                        <span className="stat-label">Net PnL</span>
                                        <span className={summary?.stats.total_pnl >= 0 ? "text-green" : "text-red"}>
                                            ${summary?.stats.total_pnl || "0.00"}
                                        </span>
                                    </div>
                                </div>
                            </div>
                        </section>

                        {/* Active Positions */}
                        <section className="panel">
                            <div className="panel-header">
                                <span><TrendingUp size={14} style={{verticalAlign: 'middle', marginRight: '6px'}}/> ACTIVE_POSITIONS ({positions.length})</span>
                            </div>
                            <div className="panel-content">
                                {positions.length === 0 ? (
                                    <div style={{color: 'var(--dim)', textAlign: 'center', marginTop: '50px'}}>SEARCHING_FOR_MARKET_SETUP...</div>
                                ) : (
                                    positions.map(p => (
                                        <div className="pos-card" key={p.symbol}>
                                            <div className="pos-header">
                                                <span className="pos-symbol">{p.symbol}</span>
                                                <span className={p.side === "Buy" ? "side-long" : "side-short"}>
                                                    {p.side === "Buy" ? "▲ LONG" : "▼ SHORT"}
                                                </span>
                                            </div>
                                            <div className="pos-details">
                                                <div>
                                                    <div className="stat-label">Entry</div>
                                                    <div>{p.entry.toFixed(4)}</div>
                                                </div>
                                                <div>
                                                    <div className="stat-label">Price</div>
                                                    <div>{p.current.toFixed(4)}</div>
                                                </div>
                                                <div>
                                                    <div className="stat-label">uPnL</div>
                                                    <div className={p.pnl >= 0 ? "text-green" : "text-red"}>
                                                        ${p.pnl.toFixed(2)}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </section>

                        {/* System Audit Logs */}
                        <section className="panel" style={{gridColumn: 'span 2'}}>
                            <div className="panel-header">
                                <span><Terminal size={14} style={{verticalAlign: 'middle', marginRight: '6px'}}/> SYSTEM_AUDIT_LOG</span>
                            </div>
                            <div className="panel-content" style={{padding: '5px 15px'}}>
                                {logs.map((log, i) => {
                                    let style = "log-info";
                                    if (log.includes("FAIL") || log.includes("ERROR")) style = "log-error";
                                    else if (log.includes("SKIP") || log.includes("THROTTLE")) style = "log-warn";
                                    else if (log.includes("VERIFIED") || log.includes("ENTRY")) style = "log-success";
                                    
                                    return <div key={i} className={`log-line ${style}`}>{log}</div>
                                })}
                            </div>
                        </section>
                    </main>
                </React.Fragment>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Dashboard />);
    </script>
</body>
</html>
